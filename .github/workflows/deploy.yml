name: CI & Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  ci:
    name: Tests & Formatting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, sqlite3, pdo_sqlite
          coverage: none

      - name: Configure Composer auth
        run: composer config -g github-oauth.github.com ${{ secrets.COMPOSER_TOKEN }}

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Check formatting (Pint)
        run: vendor/bin/pint --test

      - name: Run tests
        run: php artisan test --compact
        env:
          APP_KEY: base64:dGVzdGluZ2tleWZvcmNpY2RwaXBlbGluZTEyMzQ1Ng==

  deploy:
    name: Deploy to Hostinger
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /home/u131020627/domains/agence-tic.com
            chmod +x deploy.sh
            bash deploy.sh
